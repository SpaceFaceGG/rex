<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vote in the Super Smash Bros REX community Crowd-BT tier list with smart pairwise matchups and live progress.">
  <title>REX Crowd-BT Voting</title>
  <link rel="canonical" href="https://spacefacegg.github.io/rex/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Super Smash Bros REX">
  <meta property="og:title" content="REX Crowd-BT Community Tier List">
  <meta property="og:description" content="Pick the better character in head-to-head matchups and help build the REX community tier list.">
  <meta property="og:url" content="https://spacefacegg.github.io/rex/">
  <meta property="og:image" content="https://spacefacegg.github.io/rex/tiermaker_pngs/mario.png">
  <meta property="og:image:alt" content="Super Smash Bros REX Crowd-BT voting page preview">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="REX Crowd-BT Community Tier List">
  <meta name="twitter:description" content="Vote in head-to-head character matchups to shape the community tier list.">
  <meta name="twitter:image" content="https://spacefacegg.github.io/rex/tiermaker_pngs/mario.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Teko:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="top-row">
        <label class="toggle-wrap" for="include-pplus">
          <input id="include-pplus" type="checkbox" checked>
          <span>Load P+ characters</span>
        </label>
        <div id="pool-info" class="pool-info">Pool: -- characters</div>
      </div>

      <h1 class="prompt">Who is the better character on a tier list?</h1>

      <div class="cards">
        <article class="card">
          <h2 id="left-name" class="char-name">Loading...</h2>
          <img id="left-image" class="char-image" alt="Left character" loading="eager">
          <button id="left-vote" class="vote-btn" type="button" disabled>Vote</button>
        </article>

        <article class="card">
          <h2 id="right-name" class="char-name">Loading...</h2>
          <img id="right-image" class="char-image" alt="Right character" loading="eager">
          <button id="right-vote" class="vote-btn" type="button" disabled>Vote</button>
        </article>
      </div>

      <button id="skip-vote" class="skip-btn" type="button" disabled>Skip this vote</button>

      <p id="status" class="status">Loading characters...</p>
      <p id="queue-status" class="queue-status">Sent: 0 | Skipped: 0</p>
      <p id="live-feedback" class="live-feedback">Live: 0 votes | Phase: coverage | Model: not computed yet | Pairing: local-fallback</p>
    </section>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
